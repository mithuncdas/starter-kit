server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php;

    # Allow large file/image uploads via API (e.g., 100MB)
    client_max_body_size 100M;
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    send_timeout 600s;

    # Hide Nginx version
    server_tokens off;

    # Default charset for JSON responses
    charset utf-8;

    # Real client IP recovery. When this nginx sits behind another proxy
    # (Cloudflare, ALB, traefik, host docker NAT), $remote_addr is the proxy.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Security headers (API responses)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API requests are routed to the Laravel front controller
    location / {
        try_files $uri /index.php?$query_string;
    }

    # Always return JSON 404 from Laravel, never serve an HTML error page
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass api_starter_laravel_php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

        # Additional FastCGI parameters
        fastcgi_read_timeout 600;
        fastcgi_connect_timeout 600;
        fastcgi_send_timeout 600;

        # Forward proxy headers so Laravel TrustProxies sees them.
        fastcgi_param HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
    }

    # Block access to hidden files and directories (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to composer/package manifests and artisan
    location ~* /(composer\.(json|lock)|package(-lock)?\.json|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
